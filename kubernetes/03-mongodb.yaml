# ── MongoDB 7.0 — PersistentVolumeClaim + Deployment + Service ─────────────────
#
# Single-replica MongoDB instance backed by a PVC.
# In production consider using AWS DocumentDB instead of running MongoDB in K8s.
# ──────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-pvc
  namespace: forkfinder
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # Explicitly request gp2 so the PVC is not stuck in Pending
  # if the cluster has no default StorageClass set.
  # gp2 is the standard EBS class on EKS; change to gp3 if your cluster uses it.
  storageClassName: gp2

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: forkfinder
  labels:
    app: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  strategy:
    type: Recreate   # required: only one pod may hold the ReadWriteOnce PVC at a time
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7.0
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongodb-storage
              mountPath: /data/db
          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: mongodb-storage
          persistentVolumeClaim:
            claimName: mongodb-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: forkfinder
  labels:
    app: mongodb
spec:
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017
  # ClusterIP — MongoDB is internal only; never exposed outside the cluster
  type: ClusterIP
