# ── User / Reviewer Service — Deployment + Service ────────────────────────────
#
# Logical scope : user registration, login, profile, preferences,
#                 favorites, activity history.
# Routes served : /auth/user/*, /users/*, /preferences/*, /favorites/*, /history/*
#
# IMAGE: Replace <YOUR_ECR_REGISTRY> with your ECR URI before applying.
#        Example: 123456789.dkr.ecr.us-east-1.amazonaws.com/forkfinder/user-service:latest
# ──────────────────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: forkfinder
  labels:
    app: user-service
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
        tier: backend
    spec:
      containers:
        - name: user-service
          image: <YOUR_ECR_REGISTRY>/forkfinder/user-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: SERVICE_NAME
              value: "user-reviewer-service"
            - name: MONGODB_URL
              valueFrom:
                configMapKeyRef:
                  name: forkfinder-config
                  key: MONGODB_URL
            - name: MONGODB_DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: forkfinder-config
                  key: MONGODB_DB_NAME
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: forkfinder-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: forkfinder-secrets
                  key: SECRET_KEY
            - name: TAVILY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: forkfinder-secrets
                  key: TAVILY_API_KEY
            - name: ALGORITHM
              valueFrom:
                configMapKeyRef:
                  name: forkfinder-config
                  key: ALGORITHM
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              valueFrom:
                configMapKeyRef:
                  name: forkfinder-config
                  key: ACCESS_TOKEN_EXPIRE_MINUTES
            - name: UPLOAD_DIR
              valueFrom:
                configMapKeyRef:
                  name: forkfinder-config
                  key: UPLOAD_DIR
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: forkfinder-config
                  key: FRONTEND_URL
            - name: OLLAMA_MODEL
              valueFrom:
                configMapKeyRef:
                  name: forkfinder-config
                  key: OLLAMA_MODEL
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: forkfinder
  labels:
    app: user-service
spec:
  selector:
    app: user-service
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
