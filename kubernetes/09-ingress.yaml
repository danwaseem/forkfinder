# ── Ingress — path-based routing ─────────────────────────────────────────────
#
# Routes API traffic to the correct backend service by URL prefix.
# Routes all other traffic to the frontend.
#
# Prerequisites:
#   The AWS Load Balancer Controller must be installed on your EKS cluster.
#   See: https://kubernetes-sigs.github.io/aws-load-balancer-controller/
#
# After applying, get the external hostname:
#   kubectl get ingress -n forkfinder forkfinder-ingress
#
# Update your DNS to point your domain to the ADDRESS shown.
# ──────────────────────────────────────────────────────────────────────────────

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: forkfinder-ingress
  namespace: forkfinder
  annotations:
    # AWS ALB (Application Load Balancer) ingress class
    kubernetes.io/ingress.class: "alb"
    alb.ingress.kubernetes.io/scheme: "internet-facing"
    alb.ingress.kubernetes.io/target-type: "ip"
    # Health check path — all backend services expose /health
    alb.ingress.kubernetes.io/healthcheck-path: "/health"
spec:
  rules:
    - http:
        paths:
          # ── Backend service routes ─────────────────────────────────────────
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 8000
          - path: /users
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 8000
          - path: /preferences
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 8000
          - path: /favorites
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 8000
          - path: /history
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 8000
          - path: /owner
            pathType: Prefix
            backend:
              service:
                name: owner-service
                port:
                  number: 8000
          - path: /restaurants
            pathType: Prefix
            backend:
              service:
                name: restaurant-service
                port:
                  number: 8000
          - path: /reviews
            pathType: Prefix
            backend:
              service:
                name: review-service
                port:
                  number: 8000
          - path: /uploads
            pathType: Prefix
            backend:
              service:
                name: user-service      # any backend pod serves uploads
                port:
                  number: 8000
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 8000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 8000
          # ── Frontend (catch-all) ───────────────────────────────────────────
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
